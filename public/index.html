<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AirDrop Web</title>

  <link rel="stylesheet" href="style.css">

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body>

<div class="container">

  <h2>Upload File Online</h2>

  <canvas id="qr"></canvas>

  <div class="top" id="topBar">
    <div>📁 Destination<br><b>Upload</b></div>
    <div>📄 Queue<br><b id="queue">0 files</b></div>
    <div>⚡ Speed<br><b id="speed">0 KB/s</b></div>
    <div>⏱ Time<br><b id="time">0s</b></div>
    <div>📊 Progress<br><b id="percent">0%</b></div>
  </div>

  <!-- DROP -->
  <div class="dropZone" id="dropZone">
    ⬆️ Drag & Drop or Click to Upload
  </div>

  <input type="file" id="fileInput" multiple hidden>

  <!-- PROGRESS -->
  <div id="fileBox">

    <b id="fileName"></b><br>
    <span id="fileSize"></span>

    <div class="progress">
      <div id="bar" class="bar"></div>
    </div>

    <div class="info">
      ⚡ <span id="speed2">0</span> KB/s |
      ⏱ <span id="time2">0</span>s |
      📊 <span id="percent2">0</span>%
    </div>

    <button onclick="cancelUpload()">Cancel</button>

  </div>

  <!-- LINK -->
  <div id="result"></div>

</div>

<script src="app.js"></script>
</body>
</html>
