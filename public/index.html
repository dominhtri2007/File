<!DOCTYPE html>
<html>
<head>
  <title>AirDrop Web</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .box {
      margin-top: 80px;
      padding: 30px;
      background: #1e293b;
      border-radius: 15px;
      display: inline-block;
    }

    button {
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    progress {
      width: 100%;
      margin-top: 10px;
    }

    #result a {
      color: #38bdf8;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>📲 AirDrop Web</h2>

  <canvas id="qr"></canvas>

  <br>

  <input type="file" id="file"><br><br>

  <button onclick="upload()">Gửi file</button>

  <progress id="progress" value="0" max="100"></progress>

  <p id="status"></p>
  <p id="result"></p>
</div>

<script>
const socket = io();

// nhận link
socket.on("file", (link) => {
  document.getElementById("result").innerHTML =
    `<a href="${link}" target="_blank">${link}</a>`;

  QRCode.toCanvas(document.getElementById("qr"), link);
});

// upload có progress
function upload() {
  const file = document.getElementById("file").files[0];
  if (!file) return alert("Chọn file!");

  const xhr = new XMLHttpRequest();
  const formData = new FormData();
  formData.append("file", file);

  xhr.open("POST", "/upload");

  xhr.upload.onprogress = (e) => {
    if (e.lengthComputable) {
      const percent = (e.loaded / e.total) * 100;
      document.getElementById("progress").value = percent;
      document.getElementById("status").innerText =
        "Đang upload: " + Math.round(percent) + "%";
    }
  };

  xhr.onload = () => {
    document.getElementById("status").innerText = "✅ Upload xong!";
  };

  xhr.send(formData);
}
</script>

</body>
</html>
